upload_file:
  name: Upload file to Tonie
  description: Upload an audio file to a Creative Tonie and add it as a new chapter
  fields:
    tonie_id:
      name: Tonie ID
      description: The ID of the Creative Tonie to upload to
      required: true
      example: "12345678-1234-1234-1234-123456789012"
      selector:
        text:
    file_path:
      name: File path
      description: Path to the audio file to upload (must be accessible by Home Assistant)
      required: true
      example: "/config/audio/story.mp3"
      selector:
        text:
    title:
      name: Chapter title
      description: Title for the new chapter
      required: true
      example: "My Story"
      selector:
        text:

add_chapter:
  name: Add chapter to Tonie
  description: Add a previously uploaded file as a chapter to a Creative Tonie
  fields:
    tonie_id:
      name: Tonie ID
      description: The ID of the Creative Tonie
      required: true
      example: "12345678-1234-1234-1234-123456789012"
      selector:
        text:
    file_id:
      name: File ID
      description: The ID of the file (obtained from upload_file service)
      required: true
      example: "87654321-4321-4321-4321-210987654321"
      selector:
        text:
    title:
      name: Chapter title
      description: Title for the chapter
      required: true
      example: "Chapter 1"
      selector:
        text:

clear_chapters:
  name: Clear all chapters
  description: Remove all chapters from a Creative Tonie
  fields:
    tonie_id:
      name: Tonie ID
      description: The ID of the Creative Tonie to clear
      required: true
      example: "12345678-1234-1234-1234-123456789012"
      selector:
        text:

sort_chapters:
  name: Sort chapters
  description: Reorder chapters on a Creative Tonie
  fields:
    tonie_id:
      name: Tonie ID
      description: The ID of the Creative Tonie
      required: true
      example: "12345678-1234-1234-1234-123456789012"
      selector:
        text:
    chapters:
      name: Chapters
      description: List of chapter objects in the desired order (with id, title, file fields)
      required: true
      example: '[{"id": "ch1", "title": "Chapter 1", "file": "file1"}, {"id": "ch2", "title": "Chapter 2", "file": "file2"}]'
      selector:
        object:
